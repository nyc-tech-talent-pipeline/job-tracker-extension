name: Package Extension

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inject client-id.json
        run: |
          echo '{"googleClientId":"'"$GOOGLE_CLIENT_ID"'"}' > client-id.json
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Package ZIP
        run: |
          zip -r ../job-tracker-extension.zip . \
            --exclude "*.git*" \
            --exclude ".github/*" \
            --exclude "config.example.json" \
            --exclude "SETUP.md"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: job-tracker-extension
          path: ../job-tracker-extension.zip
